<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><title>游戏目录 - 首页</title><link rel="stylesheet" href="./css/style.css"/></head><body>
