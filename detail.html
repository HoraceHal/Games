
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>游戏详情</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/detail-rightpanel.css" />
</head>
<body>
<header class="header">
  <div class="container nav">
    <div class="brand" style="gap:12px"><span class="logo"></span><span class="brand-name">Games 目录</span></div>
    <div class="actions"><button id="themeToggle" class="toggle" aria-label="切换主题">夜间</button></div>
  </div>
</header>
<main>
  <div class="container" style="padding:14px 0">
    <div class="breadcrumb" style="color:var(--muted);font-size:13px;margin:6px 0">首页 / 游戏详情</div>
    <h1 id="title" class="game-title" style="margin:6px 0 10px"></h1>
  </div>

  <div class="container">
    <div class="columns">
      <!-- 左：封面 + 小尺寸轮播（带左右按钮） -->
      <section id="leftCol">
        <div class="hero hero-box"><img id="hero" alt="封面" loading="lazy" /></div>

        <h3 class="block-title">游戏截图</h3>
        <div class="carousel small" id="carousel">
          <button class="nav prev" aria-label="上一张" id="prevBtn">◀</button>
          <div class="viewport"><div class="track" id="track"></div></div>
          <button class="nav next" aria-label="下一张" id="nextBtn">▶</button>
        </div>

        <div class="back" style="margin-top:12px"><a class="toggle" href="index.html">← 返回首页</a></div>
      </section>

      <!-- 右：更窄的圆角淡蒙版卡片（版本信息 + 游戏简介） -->
      <aside id="rightCol">
        <div class="panel">
          <h3 class="panel-title">版本信息</h3>
          <table class="table">
            <tr><th>文件大小</th><td id="size"></td></tr>
            <tr><th>版本</th><td id="version"></td></tr>
            <tr><th>平台</th><td id="platform"></td></tr>
            <tr><th>更新日期</th><td id="date"></td></tr>
            <tr><th>浏览量</th><td id="views"></td></tr>
          </table>
        </div>
        <div class="panel" style="margin-top:16px">
          <h3 class="panel-title">游戏简介</h3>
          <p id="desc" class="desc-body"></p>
        </div>
      </aside>
    </div>
  </div>
</main>
<footer class="footer"><div class="container"><div><strong>声明：</strong>本页仅展示游戏信息与截图，不提供下载与任何交易。</div><div class="wx">如需获取资源，请添加微信：<strong>lyz7595</strong></div></div></footer>
<script src="./js/detail.js"></script>
</body>
</html>
