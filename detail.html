
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>游戏详情</title>
<link rel="stylesheet" href="./css/style.css" />
<link rel="stylesheet" href="./css/detail-fix.css" />
</head>
<body>
<header class="header"><div class="container nav"><div class="brand"><span class="logo"></span><span>Games 目录</span></div></div></header>
<main>
<div class="container">
<h1 id="title"></h1>
<div class="columns">
<section id="leftCol">
<div class="hero-box"><img id="hero" loading="lazy" /></div>
<h3>游戏截图</h3>
<div class="carousel small" id="carousel">
<button class="nav prev" id="prevBtn">◀</button>
<div class="viewport"><div class="track" id="track"></div></div>
<button class="nav next" id="nextBtn">▶</button>
</div>
<a href="index.html">← 返回首页</a>
</section>
<aside id="rightCol">
<div class="panel" id="panelInfo">
<h3>版本信息</h3>
<table class="table">
<tr><th>文件大小</th><td id="size"></td></tr>
<tr><th>版本</th><td id="version"></td></tr>
<tr><th>平台</th><td id="platform"></td></tr>
<tr><th>更新日期</th><td id="date"></td></tr>
<tr><th>浏览量</th><td id="views"></td></tr>
</table>
</div>
<div class="panel" id="panelDesc">
<h3>游戏简介</h3>
<p id="desc"></p>
</div>
</aside>
</div>
</div>
</main>
<script src="./js/detail.js"></script>
</body>
</html>
