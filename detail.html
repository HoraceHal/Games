<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>游戏详情</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
<header class="header">
  <div class="container nav">
    <div class="brand"><span class="logo"></span><span>GameHub 目录</span></div>
    <nav class="menu"></nav>
  </div>
</header>
<main>
  <div class="hero"><img id="hero" alt="封面"/><div class="overlay"></div></div>
  <div class="container">
    <div class="breadcrumb">首页 / 游戏详情</div>
    <h1 class="game-title" id="title"></h1>
    <div class="columns">
      <section class="section">
        <h3 style="margin:0 0 8px">游戏简介</h3>
        <p id="desc" style="color:#d7d7d7;line-height:1.7"></p>
        <h3 style="margin:16px 0 8px">游戏截图</h3>
        <div id="gallery" class="gallery"></div>
        <div class="back"><a class="btn" href="index.html">返回首页</a></div>
      </section>
      <aside class="section">
        <h3 style="margin:0 0 8px">版本信息</h3>
        <table class="table">
          <tr><th style="width:120px">文件大小</th><td id="size"></td></tr>
          <tr><th>版本</th><td id="version"></td></tr>
          <tr><th>平台</th><td id="platform"></td></tr>
          <tr><th>更新日期</th><td id="date"></td></tr>
        </table>
        <div style="margin-top:12px;font-size:14px;color:#b9b9b9">更多信息与资源获取方式，请查看页面底部。</div>
      </aside>
    </div>
  </div>
</main>
<footer class="footer">
  <div class="container">
    <div><strong>声明：</strong>本页仅展示游戏信息与截图，不提供下载与任何交易。</div>
    <div class="wx">如需获取资源，请添加微信：<strong>lyz7595</strong></div>
  </div>
</footer>
<script src="./js/detail.js"></script>
</body>
</html>
