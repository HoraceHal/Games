name: Convert PNG to WebP (recursive, covers + shots)

on:
  push:
    branches: [ main ]
    paths:
      - "images/**/*.png"    # 监听任意子目录下的 PNG
  pull_request:
    branches: [ main ]
    paths:
      - "images/**/*.png"
  workflow_dispatch: {}      # 手动运行
  schedule:
    - cron: "30 1 * * *"     # 每天 01:30 UTC 全量补齐（可按需修改或删除）

permissions:
  contents: write

concurrency:
  group: png-to-webp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WebP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      # 计算需要转换的 PNG（递归）
      - name: Compute PNG targets (recursive, fill missing)
        id: targets
        shell: bash
        run: |
          set -e
          # push/pr 只处理本次变更；手动/定时则全量扫描
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "pull_request" ]]; then
            # 取最近一次提交（或 PR 变更）涉及到的 PNG
            git diff --name-only HEAD~1 HEAD | awk '/^images\/.*\.png$/i' > /tmp/png_changed.txt || true
          else
            # 全量扫描 images 目录
            find images -type f -iname '*.png' | sort > /tmp/png_changed.txt || true
          fi

          # 过滤：只保留“同名 .webp 不存在”的 PNG
          > /tmp/png_todo.txt
          while IFS= read -r png; do
            [[ -z "$png" ]] && continue
            webp="${png%.*}.webp"
            if [[ ! -f "$webp" ]]; then
              echo "$png" >> /tmp/png_todo.txt
            fi
          done < /tmp/png_changed.txt

          echo "---- Changed PNG ----"; cat /tmp/png_changed.txt || true
          echo "---- To Convert ----"; cat /tmp/png_todo.txt || true

          count=$(wc -l < /tmp/png_todo.txt | tr -d ' ')
          echo "count=$count" >> $GITHUB_OUTPUT

      # 递归转换（covers + shots 全覆盖）
      - name: Convert to WebP (quality 82, near-lossless for alpha)
        if: steps.targets.outputs.count != '0'
        shell: bash
        run: |
          set -e
          while IFS= read -r png; do
            [[ -z "$png" ]] && continue
            webp="${png%.*}.webp"
            # 统一使用 cwebp；参数对 UI/截图较友好
            cwebp -q 82 -m 6 -metadata icc -alpha_q 85 -near_lossless 60 "$png" -o "$webp"
            echo "generated: $webp"
          done < /tmp/png_todo.txt

      - name: Commit & Push .webp
        if: steps.targets.outputs.count != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "actions[bot]@users.noreply.github.com"
          git add images/**/*.webp || true
          git commit -m "Auto: convert PNG to WebP (recursive)" || echo "No changes"
          git push

      - name: Nothing to convert
        if: steps.targets.outputs.count == '0'
        run: echo "No PNG to convert (or all webp already exist)."
``
