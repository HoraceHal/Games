name: Convert images to WebP and rewrite games.json

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "images/**"
      - "games.json"
      - "tools/webp_batch_convert.py"

permissions:
  contents: write

jobs:
  webp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Convert to WebP + update games.json
        run: |
          python tools/webp_batch_convert.py --root . --quality 80 --keep-original

      - name: Commit changes (if any)
        run: |
          if git status --porcelain | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: convert images to webp [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
``